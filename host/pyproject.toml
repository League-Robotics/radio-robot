[project]
name = "robot-radio"
version = "0.20260602.1"
requires-python = ">=3.11"
dependencies = [
    "pyserial>=3.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["robot_radio"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
norecursedirs = ["vendor", "node_modules", "built", ".pxt", "old", "__pycache__"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
