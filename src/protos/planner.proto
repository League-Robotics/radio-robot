syntax = "proto3";

package robot;

import "common.proto";
import "options.proto";

// ---------------------------------------------------------------------------
// Planner (MotionController) subsystem messages
// ---------------------------------------------------------------------------

// Current drive mode of the planner.
enum DriveMode {
  IDLE      = 0;
  STREAMING = 1;
  TIMED     = 2;
  DISTANCE  = 3;
  GO_TO     = 4;
  VELOCITY  = 5;
}

// How to decelerate when a stop condition triggers.
enum StopStyle {
  SMOOTH = 0;
  ABRUPT = 1;
}

// Who originated this command.
enum Origin {
  USER      = 0;
  AUTONOMOUS = 1;
}

// Comparison operator for sensor/value stop conditions.
enum CmpOp {
  LT = 0;
  GT = 1;
  EQ = 2;
}

// What kind of stop condition this is.
enum StopKind {
  STOP_NONE     = 0;
  STOP_TIME     = 1;
  STOP_DISTANCE = 2;
  STOP_HEADING  = 3;
  STOP_POSITION = 4;
  STOP_SENSOR   = 5;
  STOP_COLOR    = 6;
  STOP_LINE_ANY = 7;
  STOP_ROTATION = 8;
}

// HeadingSourceMode -- 109-005: per-robot override of App::HeadingSource's
// own OTOS-first/encoder-fallback policy, baked at boot from the robot
// JSON's `control.heading_source` key (gen_boot_config.py) into
// PlannerConfig.heading_source below. AUTO is the normal policy (OTOS
// whenever present/connected/fresh, encoder fallback after N stale cycles,
// re-promote on recovery); the two FORCE_* values let a robot with a known-
// bad OTOS mount (or a bench rig with no OTOS wired at all) skip the
// fallback state machine entirely rather than trust a policy that will
// never see a good OTOS reading in the first place.
enum HeadingSourceMode {
  HEADING_SOURCE_AUTO           = 0;
  HEADING_SOURCE_FORCE_OTOS     = 1;
  HEADING_SOURCE_FORCE_ENCODER  = 2;
}

// A single stop condition evaluated per tick.
message StopCondition {
  StopKind kind   = 1;
  float    a      = 2;
  float    b      = 3;
  float    ax     = 4;
  float    ay     = 5;
  uint32   sensor = 6;
  CmpOp    cmp    = 7;
}

// ---------------------------------------------------------------------------
// Goal variants (one per PlannerCommand.goal oneof arm)
// ---------------------------------------------------------------------------

// Constant body-velocity goal with a duration.
message VelocityGoal {
  float  v_x      = 1;
  float  v_y      = 2;
  float  omega    = 3;
  uint32 duration = 4;
}

// Pose-goto goal: drive to (x, y) at speed.
message GotoGoal {
  float x     = 1;
  float y     = 2;
  float speed = 3;
}

// Turn-in-place to an absolute heading.
message TurnGoal {
  float heading = 1;
  float speed   = 2;
}

// Drive a signed distance at a given speed.
message DistanceGoal {
  float  distance = 1;
  float  speed    = 2;
}

// Drive for a fixed duration (vx, omega).
message TimedGoal {
  float  v_x      = 1;
  float  omega    = 2;
  uint32 duration = 3;
}

// Rotate by a relative angle at speed.
message RotationGoal {
  float angle = 1;
  float speed = 2;
}

// Streaming body-velocity (open-loop, no auto-stop).
message StreamGoal {
  float v_x   = 1;
  float v_y   = 2;
  float omega = 3;
}

// ---------------------------------------------------------------------------
// Planner command, state, and config
// ---------------------------------------------------------------------------

// Command for the planner: one goal variant + stop conditions + metadata.
// Equivalent to today's GoalRequest union.
message PlannerCommand {
  oneof goal {
    VelocityGoal velocity  = 1;
    GotoGoal     goto_goal = 2;
    TurnGoal     turn      = 3;
    DistanceGoal distance  = 4;
    TimedGoal    timed     = 5;
    RotationGoal rotation  = 6;
    StreamGoal   stream    = 7;
    bool         stop      = 8;  // explicit stop (true = stop now)
  }
  repeated StopCondition stops = 9 [(max_count) = 4];
  StopStyle style              = 10;
  Origin    origin             = 11;
  string    corr_id            = 12;  // correlation ID for reply tracking
  // verb -- 090-004: the wire verb that staged this goal, empty for S/T/D/G
  // (Planner's own msg::DriveMode already names the verb unambiguously),
  // "R"/"TURN"/"RT" otherwise (all three of which can share a DriveMode value
  // with S/T -- see motion_commands.h). Threaded straight through to the
  // Planner's own persisted verb_ (mirrors corr_id -> corrId_) so a completed
  // goal's msg::Event can self-describe its "done <verb>" wire name without
  // Planner depending on CommandProcessor or any wire text.
  string    verb                = 13;
}

// Read-only snapshot of the planner's internal state.
// Equivalent to today's DesiredState.
message PlannerState {
  DriveMode  mode            = 1;
  float      target_x        = 2;
  float      target_y        = 3;
  float      target_speed    = 4;
  float      distance_target = 5;
  uint32     deadline        = 6;
  BodyTwist3 body_twist      = 7;
  bool       active          = 8;
}

// Motion-only RobotConfig subset owned by the Planner.
// Drive geometry/PID are in DrivetrainConfig, not here.
//
// Fields 15-31 (100-001, motion-stack-v2 M1) -- Drive::Limits' wire/config
// source: the source/drive/ subsystem (architecture-update.md's stateless
// planner/tracker) is deliberately self-contained and reads NOTHING from
// DrivetrainConfig, so every tunable Drive::Limits/the tracker/the policy
// layer needs is declared here, even where a field of the SAME NAME already
// exists on DrivetrainConfig (v_wheel_max/steer_headroom, fields 10/11
// there) -- see architecture-update.md Decision 2 for why this is a
// deliberate duplication, not an oversight: DrivetrainConfig's fields 10/11
// keep serving the OLD Drivetrain's DIRECT-mode (TWIST/WHEELS) saturation
// path untouched through this whole sprint, and reusing them here would
// leak a hidden coupling across this sprint's own module boundary (M1 vs.
// the untouched DrivetrainConfig schema). Declared only this ticket -- no
// C++ consumer reads these until tickets 003-005 (Drivetrain/MotionPlan/
// tracker/policy); numeric values are CONSERVATIVE STARTING VALUES, not
// yet bench-tuned (see data/robots/tovez.json's own note), except
// v_wheel_max, which IS bench-measured (~620 mm/s plateau, matching the
// architecture-update.md issue's own "Wire schema & config" section).
message PlannerConfig {
  reserved 10, 11;
  float  a_max              = 1;
  float  a_decel            = 2;
  float  v_body_max         = 3;
  float  yaw_rate_max       = 4;
  float  yaw_acc_max        = 5;
  float  j_max              = 6;
  float  yaw_jerk_max       = 7;
  float  arrive_tol         = 8;
  float  turn_in_place_gate = 9;
  float  min_speed          = 12;
  float  heading_kp         = 13;  // [1/s] outer heading-loop proportional gain, per-robot tunable
  float  heading_kd         = 14;  // dimensionless outer heading-loop derivative gain, per-robot tunable

  // [mm/s] wheel-speed ceiling Drive::Drivetrain::plan() folds into v_eff
  // (Decision 2 -- deliberately separate from DrivetrainConfig.v_wheel_max,
  // field 10 there). Bench-measured plateau (~620 mm/s); see tovez.json.
  float v_wheel_max = 15;

  // [mm/s] headroom below v_wheel_max reserved for steering/trim authority
  // (Decision 2 -- deliberately separate from DrivetrainConfig.
  // steer_headroom, field 11 there). Mirrors source/kinematics/
  // body_kinematics.h's own steerHeadroom semantics: ceiling = v_wheel_max
  // - steer_headroom.
  float steer_headroom = 16;

  // [mm/s] admission-time cap on the joint per-wheel speed step when
  // chaining two segments of different curvature (Drivetrain::admit()'s
  // JOINT_STEP_TOO_LARGE verdict): v*|delta_kappa|*trackwidth/2 must stay
  // within this bound.
  float wheel_step_max = 17;

  // [1/s] Kanayama along-track trim gain (k_s in the trim law:
  // v_cmd = v_ref + clamp(k_s*e_along, +-trim_v_max)). Starting value 2.0
  // -- PM ~=70 deg at the plant's ~130-170ms lag (architecture-update.md's
  // "Control laws and numbers" table).
  float track_k_s = 18;

  // [1/s] Kanayama heading trim gain (k_theta in the trim law:
  // omega_cmd = omega_ref + clamp(k_theta*e_theta + k_cross*v_ref*e_cross,
  // +-trim_omega_max)). Carried from sprint 098's proven heading_kp=6.0
  // (hardware-verified +-1 deg turn accuracy).
  float track_k_theta = 19;

  // [rad/mm^2] Kanayama cross-track trim gain (k_cross above). Starting
  // value 1.5e-5 -- keeps the trim loop's natural frequency omega_n =
  // v*sqrt(k_cross) <= ~2.3 rad/s at plateau speed, zeta >= 1.3 everywhere.
  float track_k_cross = 20;

  // [mm/s] symmetric clamp on the along-track trim term (trimVMax in the
  // trim law above). Starting value 120 mm/s.
  float trim_v_max = 21;

  // [rad/s] symmetric clamp on the heading trim term (trimOmegaMax in the
  // trim law above). The issue's own table gives TWO context-dependent
  // values for this one wire field -- "1.0 arc / 2.0 pivot [rad/s]"
  // (architecture-update.md's "Control laws and numbers" table) -- because
  // pivot mode routes ALL heading correction through this single term
  // (v_cmd is pinned to a literal 0.0f in pivot mode, so there is no
  // separate along-track trim to share authority with) and needs the
  // larger ceiling to avoid pinning the spin-up trim (alpha*tau ~= 1.6
  // rad/s per that table's own basis note). This field is seeded with the
  // PIVOT value (2.0) -- the arc-mode 1.0 rad/s ceiling is left to the
  // tracker's own per-mode logic (ticket 004) to derive from this field
  // rather than wire a second config field for it. Flagged, not silently
  // resolved -- see this ticket's completion notes.
  float trim_omega_max = 22;

  // [mm] replan-envelope base term for the position-error trigger (the
  // "outside envelope" half of trim-saturated-AND-outside-envelope,
  // architecture-update.md's "Replan envelopes" table). Approximates BOTH
  // the along-track envelope's flat term (e_along envelope = 40mm +
  // 0.25s*|v_ref|; the 0.25 rate-scaling coefficient is NOT wire-tunable
  // this ticket, left to the policy module's own constant, ticket 005) and
  // the cross-track envelope's flat bound (e_cross envelope = 35mm flat,
  // close enough to 40mm to share one config value rather than add an
  // 18th field for a ~5mm difference). Flagged, not silently resolved.
  float replan_err_pos = 23;

  // [rad] replan-envelope base term for the heading-error trigger (e_theta
  // envelope = 0.15 rad + 0.20s*|omega_ref|; the 0.20 rate-scaling
  // coefficient is likewise left to the policy module's own constant).
  float replan_err_theta = 24;

  // [s] sustain window: how long an envelope violation (while trim-
  // saturated) must persist before REPLAN_DUE fires. 200ms per the
  // "Replan envelopes" table.
  float replan_hold = 25;

  // [s] minimum time between successive replans (the rate-limit half of
  // the sustain/rate-limit/N-max state machine). >=300ms per the same
  // table.
  float replan_min_period = 26;

  // Dimensionless: maximum replans per segment before ABORT_REPLAN_LIMIT
  // (N-max = 3 per the same table). A float field, matching this
  // message's/PlannerConfigPatch's uniform "optional float" wire pattern
  // -- not a uint32 -- so the same generated decoder path handles every
  // one of fields 15-31 identically.
  float replan_max = 27;

  // [mm] flying-handoff (vExit != 0) position-tolerance base term. The
  // issue's own handoff envelope is "e_cross <= 30mm, |e_theta| <= 5deg,
  // e_along <= 0.14*vExit + 40mm" -- this field carries the along-track
  // envelope's FLAT term (40mm), which this ticket also uses as an
  // approximation for the cross-track bound (30mm, close enough to share
  // one config value rather than add an 18th/19th field). Pairs with
  // handoff_tol_v below: tolerance(vExit) = handoff_tol_pos +
  // handoff_tol_v * vExit. Flagged, not silently resolved.
  float handoff_tol_pos = 28;

  // [s] flying-handoff velocity-coupling SLOPE term -- the "0.14" in
  // "e_along <= 0.14*vExit + 40mm" above. Dimensionally a time constant
  // (mm = [s] * mm/s), not a velocity -- named handoff_tol_v (matching the
  // issue's own field name) because it is the coefficient that scales the
  // handoff tolerance BY the exit velocity, budgeting legitimate tracking
  // lag proportional to speed (architecture-update.md: "budgets legitimate
  // lag"). Flagged, not silently resolved -- see this ticket's completion
  // notes.
  float handoff_tol_v = 29;

  // [mm/s] terminal completion's velocity gate: |v_measured| <= this value
  // (architecture-update.md's Terminal spec: "|v-hat| <= 15 mm/s").
  float arrive_vel_tol = 30;

  // [s] terminal completion's dwell: the position+velocity gate must hold
  // for this long before DONE_STOP fires (150ms per the Terminal spec).
  // NOTE: the position half of the terminal gate (10-15mm) reuses the
  // EXISTING arrive_tol field (8) above -- not a new field 15-31 (the
  // issue's own field-15-31 list has no separate "arrive tolerance
  // position" entry, confirming field 8 is the intended reuse).
  float arrive_dwell = 31;

  // --- 109-005: DISTANCE-mode arc/pivot heading-PD-cascade dwell gate ---
  // (Motion::Executor's own rest-terminated-heading-command completion
  // criterion, App::HeadingSource's per-robot override.)

  // heading_source -- App::HeadingSource's per-robot policy override, baked
  // from the robot JSON's `control.heading_source` (gen_boot_config.py).
  // See HeadingSourceMode's own doc comment above.
  HeadingSourceMode heading_source = 32;

  // [rad] the heading-dwell completion gate's own angular-error half:
  // |delta_heading - measured_heading| must fall below this AND
  // heading_dwell_rate below before the hold timer (arrive_dwell, reused
  // -- see that field's own comment) starts counting. 0.5 deg default
  // (sprint-098's own proven turn-accuracy bar,
  // .clasi/knowledge/heading-loop-solves-turn-accuracy.md).
  float heading_dwell_tol = 33;

  // [rad/s] the heading-dwell completion gate's own angular-RATE half:
  // |measured heading rate| must fall below this AND heading_dwell_tol
  // above before the hold timer starts counting. 1 deg/s default.
  float heading_dwell_rate = 34;

  // --- 109-010: three independently-tunable lead-compensation Δt's,
  // characterized-and-inverted per the ticket's own rate-sweep regression
  // (src/firm/motion/DESIGN.md's own "Turn-error characterization" entry
  // documents the fitted equation each of these three was derived from).
  // Each compensates a DIFFERENT physical delay at a DIFFERENT locus -- they
  // are not the same number and must not be collapsed into one shared
  // constant (the ticket's own history note: `Motion::kDeadTime`, a SINGLE
  // shared constant, was tried at the wrong locus -- the divergence check --
  // in ticket 006 and produced false positives; divergence checking stays
  // UN-led, still using kDeadTime==0 effectively, i.e. untouched by any of
  // these three fields).

  // [s] locus 1 -- App::HeadingSource's own measurement-age projection
  // (`theta_est = theta_meas + omega_meas * age`): an ADDITIONAL bias added
  // on top of the REAL, measured age (time since Devices::Otos's own last
  // fresh burst read -- HeadingSource tracks that itself, not a config
  // value) for whatever systematic residual the sweep's own regression
  // still shows after the measured-age term alone. 0.0 is a valid default
  // (the measured-age term is the dominant compensation; this is headroom
  // for a further-fitted correction, not a required nonzero value).
  float heading_lead_bias = 35;

  // [s] locus 2 -- Motion::Executor's own plan-lead on the wheel-velocity
  // reference: the dominant channel's own JerkTrajectory::peek() is
  // evaluated at `elapsed + plan_lead` (a closed-form sample, NOT a second
  // solve) rather than at `elapsed`, so the velocity Drive::setTwist()
  // receives already anticipates the actuation-transport delay between
  // "Executor computed a reference" and "the wheel actually moves at it".
  float plan_lead = 36;

  // [s] locus 3 -- Motion::Executor's own dwell/terminal completion
  // decision: the heading-error test the dwell-hold gate uses is evaluated
  // against a PREDICTED heading (`thetaMeasRel + thetaRate * terminal_lead`)
  // instead of the raw current sample, so the completion decision is not
  // itself lagging the same OTOS read-rate staleness the raw measurement
  // carries. Deliberately NOT applied to `checkDivergence()`'s own
  // comparison -- see this file's own comment above and executor.h/.cpp's
  // "History note" doc comments.
  float terminal_lead = 37;
}
