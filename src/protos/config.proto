syntax = "proto3";

package robot;

// ---------------------------------------------------------------------------
// Config plane wire types (096-001, M1). Curated to mirror ONLY the 15 keys
// `config_commands.cpp`'s `kAllKeys` already registers
// (architecture-update.md (096) Decision 2) -- never the full generated
// `DrivetrainConfig` (41 fields) / `MotorConfig` (10) / `PlannerConfig` (10)
// messages directly, which cannot fit the 186-byte envelope budget
// individually (Step 1), and marking every one of THEIR fields `optional`
// would ripple `Opt<T>` into every existing `configure()` call site (Risk
// 4, resolved structurally by never doing that). Reused by envelope.proto's
// `ConfigDelta`/`ConfigSnapshot` oneofs -- this file declares only the
// PIECES (the target enum + the three curated Patch messages); the
// envelope-level oneof wrappers themselves stay declared in envelope.proto,
// mirroring how DrivetrainCommand/MotionSegment/SetPose/OdometerCommand are
// each declared in their OWN subsystem proto file and only referenced (not
// redeclared) from CommandEnvelope/ReplyEnvelope's oneof arms.
//
// Validation note (traceability gap, flagged not silently reconciled --
// same posture as this document's own Decision 3/6): `config_commands.cpp`'s
// `validateCandidate()` additionally enforces three business-rule
// invariants beyond plain per-key parsing -- `trackwidth > 0`,
// `rotational_slip` in the SET `{0} ∪ [0.5, 1.0]` (a non-contiguous
// domain no single `(min)`/`(max)`/`(abs_max)` pair can express), and
// `sTimeout > 0`. This ticket does NOT attach `(min)`/`(max)`/`(abs_max)`
// options to the fields below: no existing config-plane proto message
// (drivetrain.proto/motor.proto/planner.proto, including the FULL
// generated messages these Patch types curate from) uses those options
// anywhere today -- in this tree they are reserved for motion-COMMAND
// fields (motion.proto's distance/speed_max/accel_max/etc., directly
// actuating hardware in real time), not general config-value bounds, and
// `config_commands.cpp`'s own validation has always lived in hand-written
// per-key checks, not a wire-level schema. Ticket 004 (BinaryChannel config
// arm) inherits this gap: its own stated design (Decision 3) is to rely on
// "the generated decoder's min/max/abs_max/req validation" for FIELD
// PARSING (replacing `parseFloatStrict`/`parseLongStrict`'s string
// parsing), not a claim that every `validateCandidate()` business rule is
// wire-enforced -- if closing this specific gap turns out to matter, ticket
// 004 (or a follow-up) adds either options here or a small hand-written
// check in `binary_channel.cpp`, neither of which this ticket's own
// acceptance criteria require.
// ---------------------------------------------------------------------------

// Which config slice a `get`/`ConfigSnapshot` names (envelope.proto).
// CONFIG_DRIVETRAIN/CONFIG_PLANNER mirror `Rt::ConfigDelta::Target`'s
// `kDrivetrain`/`kPlanner` directly. CONFIG_MOTOR_LEFT/CONFIG_MOTOR_RIGHT
// split `Rt::ConfigDelta`'s single `kMotor`+`port` target into the two
// independently-addressable bound motors `config_commands.cpp`'s existing
// `ml`/`mr` keys already read/write per-side -- a `ConfigSnapshot` reply
// needs to self-identify WHICH side's snapshot it carries, not just
// "motor" (Decision 4). CONFIG_WATCHDOG (`sTimeout`) is NOT one of the
// Configurator's four fold targets at all (Open Question 4): it routes to
// `bb.streamWatchdogWindowIn` directly at the `BinaryChannel` boundary
// (ticket 004), never `bb.configIn` -- see `config_commands.h`'s own
// file-header note about `sTimeout` being "the one key that is NOT one of
// the Configurator's four targets."
// CONFIG_OTOS (109-004): OtosConfigPatch's own target -- mirrors the other
// four entries' 1:1 Patch-kind correspondence. Added alongside
// OtosConfigPatch below; no live GET/ConfigSnapshot arm reads it this
// sprint (Architecture Revision 1's "host-side GET echo" decision covers
// OL/OA -- see protocol.py), but the enum slot exists now so a later
// ConfigSnapshot extension does not need a wire-schema change of its own.
// CONFIG_ESTIMATOR (117): EstimatorConfigPatch's own target -- mirrors
// CONFIG_OTOS's own 1:1 Patch-kind correspondence exactly. Added alongside
// EstimatorConfigPatch below; same "no live GET/ConfigSnapshot arm this
// sprint" posture as CONFIG_OTOS.
enum ConfigTarget {
  CONFIG_DRIVETRAIN  = 0;
  CONFIG_MOTOR_LEFT  = 1;
  CONFIG_MOTOR_RIGHT = 2;
  CONFIG_PLANNER     = 3;
  CONFIG_WATCHDOG    = 4;  // routes to bb.streamWatchdogWindowIn, not bb.configIn
  CONFIG_OTOS        = 5;
  CONFIG_ESTIMATOR   = 6;
}

// Which of the drivetrain's two bound motors `MotorConfigPatch.side`
// selects for `travel_calib` ONLY (Decision 5) -- mirrors
// `config_commands.cpp`'s `ml` (left)/`mr` (right) key pair. Deliberately a
// SEPARATE type from `ConfigTarget` above: `ConfigTarget` addresses a whole
// GET/`ConfigSnapshot` SLICE and has no drivetrain/planner/watchdog
// counterpart here, while `BoundMotorSide` addresses only WHICH bound
// motor a single field (`travel_calib`) inside one `MotorConfigPatch`
// applies to.
enum BoundMotorSide {
  LEFT  = 0;
  RIGHT = 1;
}

// Curated patch of DrivetrainConfig's 6 registered keys
// (config_commands.cpp kAllKeys: tw, rotSlip, ekfQxy, ekfQtheta,
// ekfROtosXy, ekfROtosTheta). `optional` (Opt<float>) presence signals
// "this field is being set" on a ConfigDelta, or "this field is
// populated" on a ConfigSnapshot reply. `Opt<T>` never reaches
// msg::DrivetrainConfig's own (non-optional) fields directly (Decision 2,
// Risk 4) -- BinaryChannel (ticket 004) is the one translation boundary
// between this patch and a Rt::ConfigDelta.
message DrivetrainConfigPatch {
  optional float trackwidth       = 1;  // [mm] tw
  optional float rotational_slip  = 2;  // rotSlip
  optional float ekf_q_xy         = 3;  // ekfQxy
  optional float ekf_q_theta      = 4;  // ekfQtheta
  optional float ekf_r_otos_xy    = 5;  // ekfROtosXy
  optional float ekf_r_otos_theta = 6;  // ekfROtosTheta
  // ekf_r_fix_xy/ekf_r_fix_theta (099-008): the delayed camera-fix's own
  // UNGATED noise pair -- mirrors ekf_r_otos_xy/ekf_r_otos_theta's own
  // wire-tunable shape exactly (architecture-update.md D5-D8).
  optional float ekf_r_fix_xy     = 7;  // ekfRFixXy
  optional float ekf_r_fix_theta  = 8;  // ekfRFixTheta
}

// Curated patch of MotorConfig's 6 registered keys (config_commands.cpp
// kAllKeys: ml/mr -> travel_calib, pid.kp/ki/kff/iMax/kaw -> the 5 Gains
// members). `side` disambiguates `travel_calib` ONLY (Decision 5) -- the
// five Gains fields below carry NO per-side selector of their own:
// BinaryChannel's translation (ticket 004) applies any present
// kp/ki/kff/i_max/kaw field to BOTH bound motors unconditionally,
// mirroring `applyConfigKey()`'s exact both-sides behavior for `pid.*`
// keys -- inventing an independently-addressable per-side PID surface
// would be new capability beyond what config_commands.cpp exposes today.
message MotorConfigPatch {
  BoundMotorSide side          = 1;  // selects travel_calib's target ONLY;
                                      // meaningless for kp/ki/kff/i_max/kaw
  optional float travel_calib  = 2;  // [mm/deg] ml (side=LEFT) / mr (side=RIGHT)
  optional float kp    = 3;  // pid.kp   -- applied to BOTH bound motors
  optional float ki    = 4;  // pid.ki   -- applied to BOTH bound motors
  optional float kff   = 5;  // pid.kff  -- applied to BOTH bound motors
  optional float i_max = 6;  // pid.iMax -- applied to BOTH bound motors
  optional float kaw   = 7;  // pid.kaw  -- applied to BOTH bound motors
}

// PlannerConfigPatch -- DELETED wholesale (115-003, gut-to-minimal-firmware
// S1 motion-stack excision). Curated planner-config live-tuning (min_speed/
// heading_kp/heading_kd/arrive_dwell/distance_kp) served Motion::Executor's
// PD cascade and completion gates, all deleted with the motion stack --
// nothing in the S1 minimal firmware reads a planner config patch.
// `ConfigTarget.CONFIG_PLANNER` (above) is left declared, unused -- an enum
// value, not a type, costs nothing to leave and needs no `reserved`.
// `PlannerConfig` itself (the full generated message this patch curated
// from) went with planner.proto's wholesale deletion in the same ticket.

// Curated patch of OTOS runtime calibration -- mirrors
// Config::OtosBootConfig's 5 fields (config/boot_config.h: offsetX/offsetY/
// offsetYaw/linearScale/angularScale) exactly, PLUS a 6th field (`init`)
// with no OtosBootConfig counterpart. 109-004 (issue
// otos-calibration-config-message.md): restores a RUNTIME path to
// Devices::Otos's existing setLinearScalar()/setAngularScalar()/setOffset()/
// init() primitives, which before this ticket were only ever called once at
// boot from baked boot_config -- see this sprint's Architecture Revision 1
// for why the host side (`OL`/`OA`/`OI`) sends this patch directly
// (NezhaProtocol.otos_config(), protocol.py) rather than through the dead
// binary_bridge.translate_command() legacy-verb layer.
//
// `linear_scale`/`angular_scale` (Opt<float> presence) mirror OL/OA's own
// wire contract: each maps 1:1 to Otos::setLinearScalar()/
// setAngularScalar() -- the chip's raw int8 register scalar, NOT a
// recomputation of OtosBootConfig's own multiplier (see otos.h's own OL/OA
// doc comment). `offset_x`/`offset_y`/`offset_yaw` (Opt<float>) mirror
// Otos::setOffset() -- the lever-arm mounting-offset register, written as a
// merged triple (RobotLoop::handleConfig reads the CURRENT offset via
// Otos::getOffset() first, then overwrites only the fields present here,
// mirroring MotorConfigPatch's own gains-merge pattern) since setOffset()
// itself always writes all three together.
//
// `init` is deliberately a PLAIN (non-optional) bool, not an Opt<float>-style
// calibration value: OI is a fire-and-forget TRIGGER (Otos::init() --
// enable signal processing, reset Kalman tracking, kick off IMU bias
// calibration), not a value being SET. RobotLoop::handleConfig calls
// Otos::init() whenever this field is true, independent of whether any
// other field in the same patch is also present.
message OtosConfigPatch {
  optional float linear_scale  = 1;  // OL -- Otos::setLinearScalar()
  optional float angular_scale = 2;  // OA -- Otos::setAngularScalar()
  optional float offset_x      = 3;  // [mm] Otos::setOffset() x
  optional float offset_y      = 4;  // [mm] Otos::setOffset() y
  optional float offset_yaw    = 5;  // [rad] Otos::setOffset() heading
  bool           init          = 6;  // OI -- Otos::init() trigger
}

// EstimatorConfigPatch (117, issue predict-to-now-odometry-estimator-ring-
// capture-dump-validation-trajectory-controller.md): App::StateEstimator's
// live v1 complementary-blend fusion-weight tuning. Mirrors OtosConfigPatch's
// own shape exactly -- a small, optional-field patch, live-applied inside
// RobotLoop::handleConfig() (ticket 003) -- with one deliberate difference:
// UNLIKE OtosConfigPatch (109-004), this patch is NEVER persisted into
// persistedTuning_/flash (Design Rationale Decision 4, this sprint's overlay
// design/design.md) -- a reboot always reverts to the baked JSON default
// (Config::defaultEstimatorConfig(), config/boot_config.h), never the
// last-live-tuned value.
//
// weight_heading_otos/weight_omega_otos map 1:1 onto App::StateEstimator::
// FusionWeights::headingOtos/omegaOtos (state_estimator.h) -- dimensionless
// [0..1] complementary-blend weights, committed 0.0 in every robot JSON this
// sprint (stakeholder's encoder-only-v1 decision). staleness_ms maps onto
// FusionWeights::staleness -- the max age (ms) a fresh OTOS reading may carry
// and still be eligible to blend. Opt<float> presence is this patch's own
// "field is being set" signal, the same convention every other *ConfigPatch
// message in this file already uses; RobotLoop::handleConfig()'s ESTIMATOR
// branch merges only the PRESENT fields onto a snapshot of
// stateEstimator_.weights() before calling setWeights() (present-field
// merge, matching applyMotorConfigPatch()/applyOtosPatch()'s own shape).
//
// Field 4 (formerly App::MoveQueue's own live-tunable time-lead
// anticipation constant, the turn-prediction campaign's own field) --
// DELETED (118 ticket 004, land-at-zero-completion-delete-stop-lead.md). A
// hand-tuned scalar with a four-retune history and no stable value (see
// that issue's own Description). Per the turn-execution review's own R6
// rule ("if adding a stage forces retuning an existing constant, the
// default action is to delete the constant, not retune it"), the
// anticipation mechanism and the constant that drove it are both deleted
// outright in favor of a land-at-zero completion predicate
// (MoveQueue::tick()'s own doc comment) computed entirely from state
// already local to MoveQueue -- there is no lead value left to configure.
// Field 4 is `reserved`, not reused (this project's standing "reserved,
// not reused" wire-stability discipline, already applied to
// ConfigDelta/CommandEnvelope/ReplyEnvelope's own retired arms in
// envelope.proto) -- see EstimatorConfigPatch's own `reserved 4;` below. A
// legacy client still sending field 4 decodes fine (WireRuntime's
// unknown-field skip, wire_runtime.h) and is silently ignored server-side;
// this is an append-only-safe removal, not a wire-format break.
//
// a_max/a_decel/alpha_max/alpha_decel (decel-into-the-goal campaign) --
// App::MoveQueue's own live-tunable Motion::VelocityShaper ceilings
// (App::MoveQueue::setShaperLimits(), App::ShaperLimits, move_queue.h).
// Ride the SAME wire arm the deleted field 4 above used to, for the
// identical "smallest coherent path" reasoning -- CONFIG_ESTIMATOR is
// already the live-tune arm for MoveQueue-owned, non-FusionWeights state,
// and inventing a fifth ConfigTarget/Patch-message pair for one more
// MoveQueue-owned quartet would duplicate that plumbing (a fresh
// ConfigTarget enum value, a fresh message, a fresh
// RobotLoop::handleConfig() branch, a fresh host NezhaProtocol method) for
// no behavioral gain over widening the arm this class already rides.
// handleConfig()'s own ESTIMATOR branch applies these four directly to
// moveQueue_'s ShaperLimits, alongside (not merged into) the FusionWeights
// merge above -- independent of whether any other field in the same patch
// is present. Same "never persisted" contract as every sibling on this
// message -- a reboot always reverts to the baked Config::ShaperBootConfig
// default.
//
// j_max/yaw_jerk_max (jerk-limited S-curve stage, 2026-07-22 stakeholder
// correction on top of a_max/a_decel/alpha_max/alpha_decel immediately
// above): App::ShaperLimits::jMax/yawJerkMax -- Motion::VelocityShaper's
// own jerk magnitude ceilings, the SAME "smallest coherent path" as their
// four siblings, riding this same arm/branch/never-persisted contract.
message EstimatorConfigPatch {
  reserved 4;  // formerly the anticipation-lead field -- deleted 118 ticket 004, see this message's own doc comment
  optional float weight_heading_otos = 1;  // [0..1] FusionWeights::headingOtos
  optional float weight_omega_otos   = 2;  // [0..1] FusionWeights::omegaOtos
  optional float staleness_ms        = 3;  // [ms] FusionWeights::staleness
  optional float a_max               = 5;  // [mm/s^2] App::ShaperLimits::aMax
  optional float a_decel             = 6;  // [mm/s^2] App::ShaperLimits::aDecel
  optional float alpha_max           = 7;  // [rad/s^2] App::ShaperLimits::alphaMax
  optional float alpha_decel         = 8;  // [rad/s^2] App::ShaperLimits::alphaDecel
  optional float j_max               = 9;  // [mm/s^3] App::ShaperLimits::jMax
  optional float yaw_jerk_max        = 10; // [rad/s^3] App::ShaperLimits::yawJerkMax
}
