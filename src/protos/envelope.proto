syntax = "proto3";

package robot;

import "config.proto";
import "telemetry.proto";

// ---------------------------------------------------------------------------
// Binary command-plane envelope -- PRUNED to the P4 wire surface (103-001,
// SUC-001, architecture-update.md (103) Decision 2/3). The single-loop
// firmware is a velocity/yaw follower, not a planner: `CommandEnvelope`
// carries exactly THREE command arms -- `twist`/`config`/`stop` -- every
// command still carries `corr_id`, but the per-command REPLY path is gone
// (Decision 2's "telemetry-only return path"): a command's outcome is
// reported via the ack ring riding inside every `Telemetry` push
// (telemetry.proto), not a dedicated `ReplyEnvelope` for that command.
// `ReplyEnvelope` itself survives, narrowed to `ok`/`err`/`tlm` -- see its
// own doc comment below for why `ok`/`err` are kept even though the ack
// ring is now the primary ack path.
//
// This is a RE-DERIVATION of sprint 102's unmerged spike-003 dry run
// (`scratch/102-003-frame-budget`, commit `10985ec1d4`), not a straight
// cherry-pick -- see this ticket's own completion notes for the real
// `gen_messages.py`-measured worst-case sizes (spike-003's numbers were a
// dry run against a slightly different field set and are not reused here
// silently).
//
// Every pre-102 arm this prune removes (drive, segment, replace, pose_fix,
// otos, ping, echo, get, stream, id, hello, ver, help, plan_dump) is
// `reserved`, not reused -- CommandEnvelope/ReplyEnvelope shipped and were
// exercised on real hardware across sprints 095-100, so the project's
// existing "reserved, not reused" wire-stability discipline (already used
// for `motion`'s field 5, below) applies to every arm this ticket removes
// too. `config`/`stop` are KEPT (not removed) and keep their pre-102 field
// numbers (6/13) unchanged -- only genuinely NEW arms (`twist`) get a fresh,
// previously-unused field number (19).
// ---------------------------------------------------------------------------

// Binary reply/error taxonomy -- unchanged shape from the pre-102 schema;
// still needed for whichever of ERR_BADARG/RANGE/DECODE/etc. the pruned
// twist/config/stop arms (or the ack ring's own err_code, telemetry.proto)
// can still produce.
enum ErrCode {
  ERR_NONE          = 0;
  ERR_UNKNOWN        = 1;  // no such oneof arm / unknown target
  ERR_BADARG         = 2;  // malformed argument (mirrors text "badarg")
  ERR_RANGE          = 3;  // (min)/(max)/(abs_max) bound violated (mirrors text "range")
  ERR_FULL           = 4;  // destination queue full (mirrors text "full")
  ERR_DECODE         = 5;  // malformed wire bytes (protobuf decode failure)
  ERR_UNIMPLEMENTED  = 6;  // declared-only arm, no live consumer this sprint
  ERR_OVERSIZE       = 7;  // encoded reply would exceed the envelope cap
}

// Flow-control ack -- unchanged shape (q/rem/t) from the pre-102 schema.
// Kept as `ReplyEnvelope.ok`'s payload even though the ack ring
// (telemetry.proto's `Telemetry.acks`) is now the PRIMARY per-command ack
// path (Decision 2): `ok`/`err` stay declared because `ReplyEnvelope`
// itself is kept as a distinct top-level type (this ticket's own
// re-measurement confirmed dropping it entirely bought nothing -- see
// completion notes), and a future ticket may still want a synchronous
// same-line ack for a command whose result cannot wait a full telemetry
// cycle. No `source/app/` ticket this sprint is required to emit `ok`/`err`
// live (ticket 004/008's own discretion) -- schema now, runtime later,
// matching the project's established precedent (e.g. 096's config/get/
// stream arms).
message Ack {
  uint32 q   = 1;
  float  rem = 2;  // [mm]
  uint32 t   = 3;  // [ms]
}

// field: the field number that failed validation (0 if not field-specific,
// e.g. ERR_UNKNOWN/ERR_DECODE); host maps it back to a field name via the
// same schema.
message Error {
  ErrCode code  = 1;
  uint32  field = 2;
}

// Twist -- the P4 command shape's ONLY motion command (NEW this ticket).
// Replaces drive/segment/replace/pose_fix/otos entirely: the host computes
// the whole trajectory and streams twist setpoints; the robot only servos
// to them (`Drive::setTwist`, source/app/drive.*, ticket 006) and arms the
// unified `Deadman` (ticket 004) for `duration`.
message Twist {
  float v_x      = 1;  // [mm/s] body-frame forward velocity
  float omega    = 2;  // [rad/s] body-frame yaw rate
  float duration = 3;  // [ms] deadman arm window
}

// Zero-field oneof arm (same "cannot be malformed" shape the pre-102 schema's
// Stop already used) -- a panic-stop must have zero ways to be malformed.
message Stop {}

// ConfigDelta -- unchanged from the pre-102 schema (096-001): still
// references config.proto's three curated Patch types plus the watchdog
// window escape hatch. Runtime application of a decoded `ConfigDelta` is a
// ticket-008-time decision (architecture-update.md (103) Step 7 Open
// Question 3, not pre-decided by this ticket) -- the schema exists so
// `Comms`/`main.cpp`'s dispatch switch can decode it now, whether or not it
// is wired to `bb`-equivalent state this sprint.
message ConfigDelta {
  oneof patch {
    DrivetrainConfigPatch drivetrain = 1;
    MotorConfigPatch      motor      = 2;
    PlannerConfigPatch    planner    = 3;
    uint32                watchdog   = 4;  // [ms] sTimeout -- StreamingDriveWatchdog window
  }
}

// One command in. corr_id is echoed back via the ack ring riding in every
// Telemetry push (telemetry.proto), NOT a per-command ReplyEnvelope --
// Decision 2's "telemetry-only return path".
message CommandEnvelope {
  // Every pre-102 arm this ticket removes -- drive(2)/segment(3)/
  // replace(4)/motion(5, already reserved pre-102)/pose_fix(7)/otos(8)/
  // ping(9)/echo(10)/get(11)/stream(12)/id(14)/hello(15)/ver(16)/help(17)/
  // plan_dump(18) -- reserved, not reused (see this file's own header
  // comment). A future sprint that re-adds any of these functionality
  // never reassigns one of these numbers to a different field.
  reserved 2, 3, 4, 5, 7 to 12, 14 to 18;
  uint32 corr_id = 1;
  oneof cmd {
    // config/stop keep their pre-102 field numbers (6/13) -- they are KEPT
    // arms, not new ones. twist is genuinely new -- assigned a fresh,
    // never-before-used field number (19), never one of the reserved
    // numbers above.
    ConfigDelta config = 6;
    Stop        stop   = 13;
    Twist       twist  = 19;
  }
}

// One reply out. corr_id echoes the CommandEnvelope's corr_id that
// triggered this reply (0 for an unsolicited reply).
message ReplyEnvelope {
  // Every pre-102 arm this ticket removes -- cfg(5)/evt(6)/id(7)/echo(8)/
  // helptext(9)/plan(10)/trace(11) -- reserved, not reused. `evt`
  // (EventNotify) is not just removed but structurally superseded:
  // fault/event notification now rides `Telemetry.fault_bits`/
  // `event_bits` (telemetry.proto) instead of a dedicated reply arm.
  reserved 5 to 11;
  uint32 corr_id = 1;
  oneof body {
    Ack       ok   = 2;
    Error     err  = 3;
    Telemetry tlm  = 4;
  }
}
