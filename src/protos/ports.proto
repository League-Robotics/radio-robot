syntax = "proto3";

package robot;

import "common.proto";
import "options.proto";

// ---------------------------------------------------------------------------
// Ports subsystem messages (digital + analog I/O)
// ---------------------------------------------------------------------------

// Digital output values and which channels to apply (mask).
message DigitalOut {
  repeated bool value = 1 [(max_count) = 4];
  uint32        mask  = 2;
}

// Analog output values and which channels to apply (mask).
message AnalogOut {
  repeated int32 value = 1 [(max_count) = 4];
  uint32         mask  = 2;
}

// Command for the ports subsystem: either digital or analog output.
message PortCommand {
  oneof control {
    DigitalOut digital_out = 1;
    AnalogOut  analog_out  = 2;
  }
}

// Read-only snapshot of port input states.
message PortState {
  repeated bool  digital_in = 1 [(max_count) = 4];
  repeated int32 analog_in  = 2 [(max_count) = 4];
  ValueSet       stamp      = 3;
}

// Configuration for the ports subsystem.
//
// 077-002 accuracy pass: the former `direction` per-port bitmap field is
// removed -- field-checked against source_old/hal/real/PortIO.{h,cpp} (the
// real device driver) and found to have no hardware counterpart. Each RJ11
// port always exposes BOTH a digital line (S2) and an analog line (S1)
// simultaneously; CODAL's MicroBitPin switches electrical direction
// per-call (setDigitalValue/getDigitalValue), so there is no persistent
// per-port mode to configure.
message PortConfig {
  uint32 lag_ports = 1;
}
