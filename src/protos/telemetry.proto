syntax = "proto3";

package robot;

import "options.proto";
import "common.proto";

// ---------------------------------------------------------------------------
// Telemetry -- FRAME v2 (115-003, gut-to-minimal-firmware S1: motion-stack
// excision + minimal per-cycle telemetry, implementing
// `telemetry-frame-tightening-amendment-to-gut-s1.md`). This is a CLEAN,
// INCOMPATIBLE rewrite of the ack-ring/bool-flag frame the 103-era schema
// shipped -- COMPAT BREAK: no wire compatibility with any pre-115 client.
// Every field is renumbered from a blank slate (Telemetry has still never
// shipped to a real robot -- declared-only until ticket 005 wires a live
// emitter -- so there is no deployed client to preserve numbers for; see
// this message's renumbering rule below).
//
// What changed from the 103-era frame:
//   - Per-source reading objects, TIMESTAMPED. `EncoderReading` replaces the
//     flat `enc_left/enc_right/vel_left/vel_right` floats -- position AND
//     velocity now ride together with the sample's own collect time.
//     `OtosReading` replaces the bare `Pose2D otos` -- it now also carries
//     the OTOS-measured velocities (v_x/v_y/omega), which the driver always
//     read and previously dropped on the floor, plus the burst's own
//     read time.
//   - ONE flags bit-string. The depth-3 ack ring (`repeated AckEntry`) and
//     nine standalone status bools plus two `fault_bits`/`event_bits`
//     bitmasks all fold into a single `flags` field -- status, fault, AND
//     event bits share one 16-bit-documented space (bits 16+ reserved).
//   - Single ack slot. `ack_corr`/`ack_err` replace the depth-3 `AckEntry`
//     ring -- a command acked within the same primary period as another
//     overwrites (stakeholder-accepted tradeoff: rare at bench rates,
//     `wait_for_ack` timeout+retry already covers it).
//   - Packed `line`/`color` sensor words -- new live consumers for the
//     line/color drivers the gut keeps, read at a rate-limited, bus-safe
//     cadence (never a naive per-pass read -- the 098-004 regression is the
//     standing precedent).
//   - `DriveMode` relocated in from the now-deleted planner.proto (its own
//     enum, unchanged shape).
//   - Deleted entirely: `AckEntry` + `AckStatus` (the ack ring and its
//     six Motion::Executor completion-outcome enumerators -- the executor
//     that produced them is gone); `ExecutorState` (queue/state-machine
//     visibility -- no queue exists in S1); `HeadingSourceStatus`
//     (App::HeadingSource is deleted -- no reported heading-source sensor
//     to expose); `queue_depth`/`active_id`/`exec_state`/`heading_source`
//     fields (executor-era reporting, already gone per the gut issue);
//     every `has_*` presence bool (folded into `flags`' presence bits).
//   - Every-cycle emission: primary period == cycle period (20 ms, not the
//     stale 40 ms this frame's old doc comment claimed matched already --
//     see `kcycle-kprimaryperiod-mismatch.md`, resolved by this rewrite).
//     "The frame is the dataset": with a timestamped frame every loop
//     iteration, the host log reconstructs any window -- no on-chip
//     measurement ring, no dump command (both deleted by the same gut
//     ticket that lands this rewrite).
//
// Renumbering (decided, `telemetry-frame-tightening-amendment-to-gut-s1.md`):
// clean renumber, every field <= 15 so every tag is 1 byte; NO `reserved`
// list -- the only consumer is this repo's own host, whose `pb2` bindings
// regenerate from the identical protos firmware co-deploys from at the
// bench, so there is no external client's field-number expectation to
// preserve (contrast envelope.proto's `CommandEnvelope`/`ConfigDelta`,
// which reserve removed numbers because THEY shipped on real hardware).
//
// Worst-case size (gen_messages.py-measured, sprint 115 ticket 003 --
// replaces `telemetry-frame-tightening-amendment-to-gut-s1.md`'s ~137 B
// estimate with the real number):
//   Telemetry, standalone (no enclosing tag/length prefix): 144 B.
//   Wrapped as ReplyEnvelope.body's `tlm` arm (how a primary frame actually
//   goes on the wire -- envelope.proto's "telemetry-only return path"):
//   147 B arm contribution (144 B payload + 1 B tag + 2 B length, since
//   144 >= 128 needs a 2-byte length varint); ReplyEnvelope total (corr_id
//   + this arm) = 153 B, 33 B margin under the 186-byte envelope budget.
// Pre-rewrite (103-era ack-ring/bool-flag frame), same ReplyEnvelope-total
// convention: 179 B, 7 B margin (spike-003's own measurement) -- this
// rewrite is smaller by 26 B while carrying strictly more signal
// (per-sample timestamps, OTOS velocities, packed line/color words).
//
// 120 (ack ring, ADDITIVE): field 14 (`acks`, `repeated AckEntry`, depth 4)
// replaces the single ack slot's own bench-measured "rare collision"
// assumption -- see bench-single-ack-slot-observability-collapses-at-40ms.md
// and Telemetry.acks's own doc comment below for the full rationale.
// Nothing above is renumbered; ack_corr/ack_err/flags bit 5 keep their
// exact prior meaning. See wire.h's own gen_messages.py-computed
// kReplyEnvelopeMaxEncodedSize comment for the regenerated worst-case size
// this addition pushed the frame to (re-measured, not hand-updated here,
// so it never drifts from the generator's own ground truth).
// ---------------------------------------------------------------------------

// Current drive mode -- relocated here from the deleted planner.proto
// (115-003, gut S1); unchanged shape.
enum DriveMode {
  IDLE      = 0;
  STREAMING = 1;
  TIMED     = 2;
  DISTANCE  = 3;
  GO_TO     = 4;
  VELOCITY  = 5;
}

// One wheel's encoder sample -- position AND velocity together, stamped
// with the sample's own collect time (robot clock, same domain as
// Telemetry.now).
message EncoderReading {
  float  position = 1;  // [mm] accumulated
  float  velocity = 2;  // [mm/s] signed, measured
  uint32 time     = 3;  // [ms] robot clock at sample collect
}

// Everything the OTOS supplies in one burst read: position, heading, AND
// the measured velocities (previously read by the driver and dropped),
// stamped with the burst's own read time.
message OtosReading {
  float  x       = 1;  // [mm]
  float  y       = 2;  // [mm]
  float  heading = 3;  // [rad]
  float  v_x     = 4;  // [mm/s]
  float  v_y     = 5;  // [mm/s]
  float  omega   = 6;  // [rad/s]
  uint32 time    = 7;  // [ms] robot clock at burst read
}

// One entry in Telemetry's bounded ack ring (120, ADDITIVE --
// bench-single-ack-slot-observability-collapses-at-40ms.md). Carries the
// exact same pair Telemetry.ack_corr/ack_err below have always carried --
// this message exists only so more than one can ride a single frame. See
// Telemetry.acks's own doc comment for why both a scalar "freshest ack"
// pair and this bounded repeated ring coexist.
message AckEntry {
  uint32 corr_id = 1 [(max) = 65535];  // CommandEnvelope.corr_id (enqueue ack) or Move.id (completion ack)
  uint32 err     = 2 [(max) = 7];      // 0 == OK; nonzero is the ErrCode (envelope.proto) value
}

message Telemetry {
  uint32    now  = 1;  // [ms] robot clock at frame assembly -- always present
  uint32    seq  = 2;  // always present
  DriveMode mode = 3;  // always present

  // flags -- THE bit string: status + faults + events, one field. Every
  // bool/bitmask the 103-era frame carried separately (has_*/active/
  // conn_left/conn_right/otos_connected/fault_bits/event_bits) lives here.
  //   bit 0  -- otos_present    (OtosReading fresh this frame)
  //   bit 1  -- otos_connected
  //   bit 2  -- active          (motion in progress)
  //   bit 3  -- conn_left       (left motor bus connectivity)
  //   bit 4  -- conn_right      (right motor bus connectivity)
  //   bit 5  -- ack_fresh       (ack_corr/ack_err are a new ack this frame)
  //   bit 6  -- fault: I2C clearance safety-net trip (known benign boot
  //             one-shot -- see the pre-rewrite frame's own bit-0 comment
  //             history for the full characterization; a healthy robot can
  //             show this bit permanently set after boot with no ongoing
  //             problem -- only a bit that flips DURING driving, not just
  //             at boot, is actionable)
  //   bit 7  -- fault: wedge latch detected
  //   bit 8  -- fault: I2C NAK/timeout
  //   bit 9  -- fault: malformed inbound frame seen
  //   bit 10 -- event: deadman expired (transition cycle)
  //   bit 11 -- event: boot ready (transition cycle)
  //   bit 12 -- event: config delta applied (transition cycle)
  //   bit 13 -- line_present    (line word fresh)
  //   bit 14 -- color_present   (color word fresh)
  //   bit 15 -- fault: MOVE timeout backstop fired (declared now, wired by
  //             sprint 116's protocol-set-point issue -- S1 does not flip
  //             this bit, S1 has no MOVE command to time out)
  //   bits 16+ reserved
  uint32 flags = 4 [(max) = 65535];

  // Single "freshest ack" slot. ack_err == 0 means OK; nonzero is the
  // ErrCode (envelope.proto) value. Valid iff flags bit 5 (ack_fresh).
  // UNCHANGED by 120's ack ring below -- a command acked within the same
  // primary period as another still overwrites THIS pair (any reader that
  // only ever looked at ack_corr/ack_err/bit 5 keeps working, unchanged);
  // acks (below) is the additive fix for a reader that wants every ack,
  // not just the freshest.
  uint32 ack_corr = 5 [(max) = 65535];
  uint32 ack_err  = 6 [(max) = 7];

  // Sensors and encoders.
  EncoderReading enc_left  = 7;
  EncoderReading enc_right = 8;
  OtosReading    otos      = 9;   // valid iff flags bit 0 (otos_present)
  Pose2D         pose      = 10;  // encoder-odometry integrated pose, always present
  BodyTwist3     twist     = 11;  // body twist from measured wheel velocities, always present

  // Packed sensor words. Valid iff flags bits 13/14 respectively.
  uint32 line  = 12;  // 4 line channels, one byte each (ch1 in the low byte)
  uint32 color = 13;  // color sensor RGBC, 8 bits per channel (R in the low byte)

  // Bounded ack ring (120, ADDITIVE -- new field, next free number after
  // 115-003's clean renumber; nothing above is renumbered or removed).
  // Carries the last kAckRingDepth (4) AckEntry pushes since Telemetry was
  // constructed, oldest evicted first on overflow -- so a host reading at
  // ~15Hz against this frame's ~25Hz emit rate still observes a transient
  // enqueue/STOP/CONFIG ack that ack_corr/ack_err above would have lost to
  // a same-primary-period overwrite
  // (bench-single-ack-slot-observability-collapses-at-40ms.md). Every
  // entry here was genuinely pushed via App::Telemetry::ack() -- unlike
  // ack_corr/ack_err (which persist their last-written value on every
  // ordinary frame, needing flags bit 5 to say "this one is new"), a
  // corr_id present in this list was a real ack; no separate freshness
  // bit applies to it. A push past depth 4 evicts the OLDEST entry, not
  // this one; see src/firm/app/DESIGN.md's "Telemetry's ack ring" note.
  repeated AckEntry acks = 14 [(max_count) = 4];
}

// TelemetrySecondary -- the slower diagnostic frame (unchanged by 115-003;
// `telemetry-frame-tightening-amendment-to-gut-s1.md` explicitly leaves
// this message untouched -- sprint.md Open Questions #3). Rides as a
// second, independently-armored `*B`-armored line, own (slower) emission
// cadence, own top-level `msg::wire::encode()` overload.
//
// NOTE: with EncoderReading.velocity now carrying velocity inside the
// PRIMARY frame's per-wheel readings, this message's own ts_left/ts_right
// sample-timestamp fields are redundant with EncoderReading.time --
// candidates for pruning if this message is next touched, per the
// amendment's own note. Not pruned here (out of this ticket's scope).
message TelemetrySecondary {
  uint32 now = 1;  // [ms] t= -- same clock as Telemetry.now, sampled at this frame's own
                    // (slower) emission cadence

  bool  has_cmd_vel   = 2;
  float cmd_vel_left  = 3;  // [mm/s] signed -- velocity PID setpoint, left
  float cmd_vel_right = 4;  // [mm/s] signed -- velocity PID setpoint, right

  float acc_left  = 5;  // [mm/s^2] EMA-filtered
  float acc_right = 6;  // [mm/s^2] EMA-filtered

  uint32 glitch_left  = 7;  // encoder glitch count, left
  uint32 glitch_right = 8;  // encoder glitch count, right

  uint32 ts_left  = 9;   // [ms] last-sample timestamp, left
  uint32 ts_right = 10;  // [ms] last-sample timestamp, right
}
