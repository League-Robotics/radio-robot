syntax = "proto3";

package robot;

import "common.proto";
import "options.proto";

// ---------------------------------------------------------------------------
// Planner (MotionController) subsystem messages
// ---------------------------------------------------------------------------

// Current drive mode of the planner.
enum DriveMode {
  IDLE      = 0;
  STREAMING = 1;
  DISTANCE  = 3;
  GO_TO     = 4;
  VELOCITY  = 5;
}

// How to decelerate when a stop condition triggers.
enum StopStyle {
  SMOOTH = 0;
  ABRUPT = 1;
}

// Who originated this command.
enum Origin {
  USER      = 0;
  AUTONOMOUS = 1;
}

// Comparison operator for sensor/value stop conditions.
enum CmpOp {
  LT = 0;
  GT = 1;
  EQ = 2;
}

// What kind of stop condition this is.
enum StopKind {
  STOP_NONE     = 0;
  STOP_TIME     = 1;
  STOP_DISTANCE = 2;
  STOP_HEADING  = 3;
  STOP_POSITION = 4;
  STOP_SENSOR   = 5;
  STOP_COLOR    = 6;
  STOP_LINE_ANY = 7;
  STOP_ROTATION = 8;
}

// A single stop condition evaluated per tick.
message StopCondition {
  StopKind kind   = 1;
  float    a      = 2;
  float    b      = 3;
  float    ax     = 4;
  float    ay     = 5;
  uint32   sensor = 6;
  CmpOp    cmp    = 7;
}

// ---------------------------------------------------------------------------
// Goal variants (one per PlannerCommand.goal oneof arm)
// ---------------------------------------------------------------------------

// Constant body-velocity goal with a duration.
message VelocityGoal {
  float  vx_mmps   = 1;
  float  vy_mmps   = 2;
  float  omega_rads = 3;
  uint32 duration_ms = 4;
}

// Pose-goto goal: drive to (x, y) at speed.
message GotoGoal {
  float x_mm      = 1;
  float y_mm      = 2;
  float speed_mmps = 3;
}

// Turn-in-place to an absolute heading.
message TurnGoal {
  float heading_rad = 1;
  float speed_mmps  = 2;
}

// Drive a signed distance at a given speed.
message DistanceGoal {
  float  distance_mm = 1;
  float  speed_mmps  = 2;
}

// Drive for a fixed duration (vx, omega).
message TimedGoal {
  float  vx_mmps    = 1;
  float  omega_rads = 2;
  uint32 duration_ms = 3;
}

// Rotate by a relative angle at speed.
message RotationGoal {
  float angle_rad  = 1;
  float speed_mmps = 2;
}

// Streaming body-velocity (open-loop, no auto-stop).
message StreamGoal {
  float vx_mmps    = 1;
  float vy_mmps    = 2;
  float omega_rads = 3;
}

// ---------------------------------------------------------------------------
// Planner command, state, and config
// ---------------------------------------------------------------------------

// Command for the planner: one goal variant + stop conditions + metadata.
// Equivalent to today's GoalRequest union.
message PlannerCommand {
  oneof goal {
    VelocityGoal velocity  = 1;
    GotoGoal     goto_goal = 2;
    TurnGoal     turn      = 3;
    DistanceGoal distance  = 4;
    TimedGoal    timed     = 5;
    RotationGoal rotation  = 6;
    StreamGoal   stream    = 7;
    bool         stop      = 8;  // explicit stop (true = stop now)
  }
  repeated StopCondition stops = 9 [(max_count) = 4];
  StopStyle style              = 10;
  Origin    origin             = 11;
  string    corr_id            = 12 [(units) = "none"];  // correlation ID for reply tracking
}

// Read-only snapshot of the planner's internal state.
// Equivalent to today's DesiredState.
message PlannerState {
  DriveMode  mode               = 1;
  float      target_x_mm       = 2;
  float      target_y_mm       = 3;
  float      target_speed_mms  = 4;
  float      distance_target_mm = 5;
  uint32     deadline_ms        = 6;
  BodyTwist3 body_twist         = 7;
  bool       active             = 8;
}

// Motion-only RobotConfig subset owned by the Planner.
// Drive geometry/PID are in DrivetrainConfig, not here.
message PlannerConfig {
  float  a_max              = 1  [(units) = "mm/s^2"];
  float  a_decel            = 2  [(units) = "mm/s^2"];
  float  v_body_max         = 3  [(units) = "mm/s"];
  float  yaw_rate_max       = 4  [(units) = "rad/s"];
  float  yaw_acc_max        = 5  [(units) = "rad/s^2"];
  float  j_max              = 6;
  float  yaw_jerk_max       = 7;
  float  arrive_tol_mm      = 8;
  float  turn_in_place_gate = 9  [(units) = "deg"];
  float  turn_threshold_mm  = 10;
  float  done_tol_mm        = 11;
  float  min_speed_mms      = 12;
}
