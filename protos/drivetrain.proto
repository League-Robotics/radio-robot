syntax = "proto3";

package robot;

import "common.proto";
import "options.proto";

// ---------------------------------------------------------------------------
// Drivetrain subsystem messages
// ---------------------------------------------------------------------------

// Imperative re-anchor of the fused pose estimate (the old SI verb).
// This is a Drive *command* (not config) — Drive owns the estimator.
message SetPose {
  float x = 1;
  float y = 2;
  float h = 3;
}

// PoseFix — CommandEnvelope.cmd.pose_fix's payload (sprint 099, D5-D8):
// retypes the formerly-declared-only arm 7 (was SetPose). Three variants
// share this one shape rather than three separate arms:
//   - reset=true            -- SI-equivalent hard re-anchor now (x, y, h;
//                               t/zero_encoders ignored).
//   - zero_encoders=true    -- ZERO-equivalent: resync the encoder-delta
//                               baseline only (x, y, h, t ignored). May be
//                               combined with reset=true in the same
//                               message; both branches run.
//   - neither flag set      -- a genuine timestamped delayed camera fix
//                               (x, y, h true at robot-clock time t) --
//                               099-004 replies ERR_UNIMPLEMENTED for this
//                               variant; 099-008 makes it live.
message PoseFix {
  float  x = 1;              // [mm] world x (meaningless when only zero_encoders is set)
  float  y = 2;               // [mm] world y
  float  h = 3;               // [rad] world heading
  uint32 t = 4;                // [ms] robot-clock timestamp this observation was true (D6)
  bool   reset = 5;            // true = SI-equivalent hard re-anchor now
  bool   zero_encoders = 6;    // true = ZERO-equivalent: resync encoder baseline
}

// PoseStep — bb.poseStepped's shape (sprint 099, Addition 1): the magnitude
// of whatever pose correction (SI reset or, from 099-008 on, a delayed fix)
// PoseEstimator applied on the immediately-prior tick() call; zero on every
// other tick. Blackboard-only this sprint (not on the wire) -- see
// architecture-update.md Decision 5.
message PoseStep {
  float pos   = 1;  // [mm] magnitude of the position correction applied THIS tick; 0 = none
  float theta = 2;  // [rad] magnitude of the heading correction applied THIS tick; 0 = none
}

// Per-wheel target array; w[] has exactly kWheelCount entries.
message WheelTargets {
  repeated WheelTarget w = 1 [(max_count) = 4];
}

// Command for the drivetrain subsystem.
// SetPose is a variant here (not in PlannerCommand).
// vy in twist is only honored when capabilities().holonomic.
message DrivetrainCommand {
  oneof control {
    BodyTwist3   twist   = 1;  // body-frame velocity setpoint
    WheelTargets wheels  = 2;  // direct per-wheel speed/position
    Neutral      neutral = 3;  // BRAKE | COAST
    SetPose      pose    = 4;  // imperative pose re-anchor
  }
  optional bool seed = 5;  // immediate-seed (S-command semantics)
  // standby: relinquish drivetrain authority, no mode change (079: Drivetrain-
  // owned authority arbitration). Rides beside the oneof exactly like `seed`
  // above -- Drivetrain::apply() processes the oneof first, then this
  // side-channel, so `{control=neutral, standby=true}` sets mode AND drops
  // authority in one call. See architecture-update.md "Authority
  // arbitration".
  optional bool standby = 6;
}

// Read-only snapshot of the drivetrain's belief and diagnostics.
// Consumers above the boundary depend only on `fused`; per-wheel fields are
// read-only diagnostics (telemetry/replay).
message DrivetrainState {
  PoseEstimate fused            = 1;  // authoritative boundary-crossing belief
  PoseEstimate encoder          = 2;  // diagnostic: dead-reckoned
  PoseEstimate optical          = 3;  // diagnostic: raw OTOS
  repeated float enc            = 4  [(max_count) = 4];  // per-wheel encoder distance (diagnostic)
  repeated float vel            = 5  [(max_count) = 4];  // per-wheel velocity mm/s (diagnostic)
  ValueSet   enc_stamp          = 6;   // encoder freshness
  ValueSet   otos               = 7;   // OTOS freshness
  repeated bool wheel_wedged    = 8  [(max_count) = 4];
  bool       connected          = 9;
  uint32     otos_status        = 10;  // raw OTOS STATUS byte (074-004)
  bool       otos_fusion_blocked = 11; // Drive::_otosFusionBlocked (074-004)
  // 087-003: Drivetrain's authority mode (active()/standby()), readable from
  // this state cell without holding a Drivetrain* -- lets a driveIn producer
  // (CommandRouter's DEV DT path, Planner's output edge) check "who
  // currently has authority" before posting (architecture-update-r1.md
  // Decision 1). true == active() (this Drivetrain currently governs its
  // bound wheel pair); false == standby()/never-yet-activated.
  bool       active             = 12;
  repeated float cmd            = 13  [(max_count) = 4];  // per-wheel post-governor commanded velocity mm/s (diagnostic: measured vel= vs commanded cmd=)
  repeated float acc            = 14  [(max_count) = 4];  // per-wheel measured acceleration mm/s^2, EMA-filtered in Drivetrain (raw d(vel)/dt is quantization noise -- see Drivetrain::updateAccelEma)
  // busy: MOTION-in-progress (segment executing / direct drive commanded),
  // distinct from `active` (the authority flag, which setNeutral() also sets
  // TRUE -- holding neutral IS governing the pair, so `active` latches 1
  // after the first STOP and can never mean "idle"). TLM's active= token
  // reports THIS field.
  bool       busy               = 15;
  // queue: motion-queue depth -- segments waiting in the Drivetrain's
  // internal ring PLUS the one currently executing (0 = idle). Surfaced in
  // the MOVE ack (`q=`) so a streaming teleop client can flow-control its
  // send rate against the actual backlog.
  uint32     queue              = 16;
  // rem: remaining translation in the executor's live plan, mm. The
  // streaming teleop's buffer-depth feedback (MOVE ack rem=): the host holds
  // it near ~0.4s of motion so the plan's to-rest tail never starts
  // mid-stream (a too-shallow buffer = 5Hz accelerate/brake pulsing).
  float      rem                = 17;
}

// Full drive configuration slice: geometry, PID gains, OTOS fusion, EKF noise.
// Motion limits (a_max, v_body_max, yaw_rate_max) are NOT here — they belong
// to PlannerConfig.
message DrivetrainConfig {
  // Differential geometry
  int32  fwd_sign_l           = 1;
  int32  fwd_sign_r           = 2;
  float  travel_calib_l       = 3;  // [mm/deg]
  float  travel_calib_r       = 4;  // [mm/deg]
  float  trackwidth            = 5;
  // Mecanum/holonomic geometry
  float  half_track            = 6;
  float  half_wheelbase        = 7;
  repeated float travel_calib_wheel = 8  [(max_count) = 4];  // [mm/deg]
  repeated int32 fwd_sign_wheel   = 9  [(max_count) = 4];
  // Velocity saturation
  float  v_wheel_max          = 10;
  float  steer_headroom       = 11;
  // Velocity PID
  // vel_gains: DEPRECATED -- superseded by per-motor MotorConfig.vel_gains
  // (077-002: the velocity loop moved from the drivetrain into the motor).
  // Retained for wire-shape stability for any host tooling still reading the
  // old shape; do not wire this into new Drivetrain code.
  Gains  vel_gains            = 12;
  float  vel_filt_alpha       = 13;
  // sync_gain: still live -- now the ratio governor's cross-wheel coupling knob.
  float  sync_gain            = 14;
  // min_wheel: DEPRECATED -- superseded by per-motor MotorConfig.min_duty
  // (077-002: the stiction floor / integrator-freeze threshold moved into the
  // motor's duty domain). Retained for wire-shape stability; do not wire this
  // into new Drivetrain code.
  float  min_wheel            = 15;
  // OTOS fusion
  float  alpha_pos            = 16;
  float  alpha_yaw            = 17;
  float  otos_gate            = 18;
  float  otos_linear_scale    = 19;
  float  otos_angular_scale   = 20;
  float  rotation_gain_pos    = 21;
  float  rotation_gain_neg    = 22;
  float  rotation_offset      = 23;
  float  rotation_offset_neg  = 24;
  float  rotational_slip      = 25;
  float  odom_off_x           = 26;
  float  odom_off_y           = 27;
  float  odom_yaw             = 28;
  bool   odom_upside_down     = 29;
  // EKF noise parameters
  float  ekf_q_xy             = 30;
  float  ekf_q_theta          = 31;
  float  ekf_r_otos_xy        = 32;
  float  ekf_r_otos_theta     = 33;
  float  ekf_q_v              = 34;
  float  ekf_q_omega          = 35;
  float  ekf_r_otos_v         = 36;
  float  ekf_r_enc_v          = 37;
  uint32 lag_otos             = 38;
  // Drivetrain type selector (kinematics variant)
  int32  drivetrain_type      = 39;
  // Bound motor-port pair (079: moved from DevLoopState::leftPort/rightPort
  // -- which wheels are mine is the same kind of fact as my trackwidth).
  // `DEV DT PORTS <l> <r>` merges these two fields; wire text unchanged.
  uint32 left_port            = 40;
  uint32 right_port           = 41;
}

// Declared drivetrain capabilities.
message DrivetrainCapabilities {
  bool   holonomic         = 1;
  bool   onboard_position  = 2;
  uint32 wheel_count       = 3;
}
