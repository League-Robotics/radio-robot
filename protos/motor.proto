syntax = "proto3";

package robot;

import "common.proto";

// ---------------------------------------------------------------------------
// Motor subsystem messages
// ---------------------------------------------------------------------------

// Command for a single motor: one control mode (oneof) + optional feedforward.
message MotorCommand {
  oneof control {
    float   duty_cycle  = 1;  // fractional [-1, 1]
    float   voltage     = 2;  // volts (capability-gated; Nezha rejects)
    float   velocity    = 3;  // mm/s -- closed by the motor's internal PID
    float   position    = 4;  // deg via onboard 0x5D (capability-gated)
    Neutral neutral     = 5;  // BRAKE or COAST
  }
  optional float feedforward    = 6;  // voltage feedforward added on top of PID output
  optional bool  reset_position = 7;  // zero the encoder this tick; rides beside any other arm
}

// Read-only snapshot of a motor's observed state.
message MotorState {
  bool            connected = 1;
  optional float  position  = 2;
  optional float  velocity  = 3;
  optional float  applied   = 4;  // applied duty cycle fraction [-1, 1]
  optional bool   wedged    = 5;  // true if motor appears stalled/jammed
  optional bool   wedge_suspect     = 6;  // motion-qualified wedge: stuck
      // latch held WHILE |appliedDuty| > output_deadband for the same
      // window -- "wedged AND was actually asked to move"
  optional uint32 hard_reset_count  = 7;  // cumulative count of hard
      // (encoder-zeroing) resets; testability/bench verification
  optional uint32 soft_reset_count  = 8;  // cumulative count of soft
      // (non-zeroing) rebaseline resets; testability/bench verification
}

// Configuration parameters for a motor.
message MotorConfig {
  float  travel_calib   = 1;  // [mm/deg] linear travel per degree of shaft rotation
  int32  fwd_sign       = 2;  // +1 or -1: physical forward direction correction
  Gains  vel_gains      = 3;  // per-motor velocity loop (kp, ki, kff, i_max, kaw)
  float  vel_filt_alpha = 4;  // EMA weight on the filtered velocity sample
  float  min_duty       = 5;  // stiction floor / integrator-freeze threshold
  float  slew_rate      = 6;  // duty slew limit (MotorSlew semantics)
  uint32 port           = 7;  // Nezha motor port (1..4) -- identity lives in Config, not the class
  optional float reversal_dwell  = 8;  // [ms] hold at commanded-zero on any
      // sign change. Unset (.has == false) -> ship default (100 ms,
      // applied in Hal::Motor::configure()). An explicit 0 is a valid,
      // meaningful value: legacy immediate-reversal, A/B bench comparison
      // only -- never ship 0 as a default.
  optional float output_deadband = 9;  // [-1,1] fraction; |duty| below this
      // writes 0 instead of a signed value. Unset (.has == false) -> ship
      // default (0.03, applied in Hal::Motor::configure()). An explicit 0
      // is a valid, meaningful value (deadband disabled).
  bool   polled = 10;  // I2C flip-flop poll-schedule membership (091-002):
      // does this port's encoder get sampled/dispatched by
      // Subsystems::NezhaHardware's brick flip-flop sequencer each tick()?
      // Established once at construction from the boot config (true for
      // the drive pair, false otherwise -- gen_boot_config.py), mutable
      // thereafter ONLY through `DEV M <n> CFG polled=<bool>` (the
      // Configurator's kMotor ConfigDelta path, NezhaHardware::setPolled())
      // -- never a side effect of an ordinary motion command. Default
      // false, matching every other placeholder default in this schema.
}

// Declared motor capabilities.
message MotorCapabilities {
  bool duty_cycle  = 1;
  bool voltage     = 2;  // false on Nezha
  bool velocity    = 3;  // true on Nezha (software PID in the leaf)
  bool position    = 4;  // true on Nezha (onboard 0x5D)
  bool has_encoder = 5;
}
