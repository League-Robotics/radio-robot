[project]
name = "microbit-v2-samples-tools"
version = "0.20260628.3"
description = "Utility scripts for building and deploying microbit-v2-samples"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "aprilcam",
    "ipykernel>=7.2.0",
    "jupyter>=1.1.1",
    "opencv-python-headless>=4.13.0.92",
    "pandas>=2.3.3",
    "pyserial>=3.5",
    "robot-radio",
]

[dependency-groups]
# Bench calibration / camera-ground-truth tooling (tests/calibrate/). Pulls in
# the aprilcam camera client (and its CV/gRPC stack). Install with `uv sync`.
calibrate = [
    "matplotlib>=3.8",
]

[tool.uv]
package = false
# Include the calibrate group by default so `uv run tests/calibrate/...` always
# has the aprilcam camera client available without an explicit --group flag.
default-groups = ["calibrate"]

[tool.uv.sources]
robot-radio = { path = "host", editable = true }
aprilcam = { path = "../AprilTags", editable = true }

[tool.pytest.ini_options]
# Pin where tests live. Without this, a bare `pytest` from the repo root
# recursively collects EVERYTHING — including vendor/PythonRobotics (90+
# matplotlib/numpy path-planning *simulation* test files), whose collection
# imports modules that allocate huge grids and open animation loops. That can
# exhaust memory on a small machine. Keep collection scoped and never descend
# into vendored sims, the build tree, or the venv.
#
# Tier layout (038 reorganization):
#   tests/simulation/unit/   — library + firmware-logic + firmware-sim pytest suites (CI gate)
#   tests/simulation/system/ — whole-robot scenario tests (also CI gate)
#   tests/_infra/sim/        — sim infrastructure (CMakeLists.txt, firmware.py) — no tests collected
#   tests/bench/             — real-hardware bench tests (opt-in, not collected by default)
#   tests/field/             — playfield tests (opt-in, not collected by default)
#
# vendor/ sims are excluded via norecursedirs below.
testpaths = ["tests/simulation"]
norecursedirs = [
    "tests/old",
    "tests/_infra/sim/build",
    "tests/bench",
    "tests/field",
    "tests/_infra/calibrate",
    "tests/_infra/tools",
    "vendor", "build", ".venv", "node_modules",
    "*.egg", ".*", "dist", "{arch}", "__pycache__",
]
