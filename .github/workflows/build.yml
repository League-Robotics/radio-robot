name: Build Natively

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

jobs:
  config-registry-sync:
    runs-on: ubuntu-latest
    name: Config registry sync lint (check_config_sync.py)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check config registry sync
        run: python src/scripts/check_config_sync.py

  host-transport-boundary:
    runs-on: ubuntu-22.04
    name: Host transport boundary (_ser must not escape serial_conn.py)
    steps:
      - uses: actions/checkout@v4
      - name: Enforce _ser encapsulation
        run: |
          result=$(grep -rn '\b_ser\b' src/host/robot_radio | grep -v 'io/serial_conn.py' || true)
          if [ -n "$result" ]; then
            echo "Transport boundary violation: _ser accessed outside io/serial_conn.py"
            echo "$result"
            exit 1
          fi

  build-py-script:
    strategy:
      matrix:
        # macos-13 is Intel and macos-15 is arm64
        os: [ubuntu-22.04, macos-13, macos-15, windows-2022]
        gcc: ['6-2016-q4', 'latest']  # Min version 6.2 as used in pext/yotta:latest docker image
        cmake: ['3.6.0', '']  # Empty string installs the latest CMake release
        exclude:
          # This old version of CMake does not run in Ubuntu 22.04
          - os: ubuntu-22.04
            cmake: '3.6.0'
          # Intel macOS cannot run the latest gcc (which is arm64 only)
          - os: macos-13
            gcc: 'latest'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}, gcc ${{ matrix.gcc }}, cmake ${{ matrix.cmake || 'latest'}}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Setup arm-none-eabi-gcc ${{ matrix.gcc }}
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: ${{ matrix.gcc }}
      - name: Setup CMake ${{ matrix.cmake }}
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ matrix.cmake }}
      - name: Install Ninja via PyPI
        run: python -m pip install ninja
      - name: Check Versions
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version
          python --version
      - name: Build default project using build.py
        run: python build.py
      - name: Upload hex file
        uses: actions/upload-artifact@v4
        with:
          name: MICROBIT-${{ matrix.os }}-gcc-${{ matrix.gcc }}-cmake-${{ matrix.cmake || 'latest' }}
          path: MICROBIT.hex
      - name: Prepare BLE example
        run: |
          rm codal.json
          mv codal.ble.json codal.json
          python -c "import pathlib; \
            f=pathlib.Path('src/firm/main.cpp'); \
            f.write_text(f.read_text().replace('out_of_box_experience()', 'ble_test()'))"
          cat codal.json
      - name: Build BLE project using build.py
        run: python build.py --clean
      - name: Upload BLE hex file
        uses: actions/upload-artifact@v4
        with:
          name: MICROBIT-BLE-${{ matrix.os }}-gcc-${{ matrix.gcc }}-cmake-${{ matrix.cmake || 'latest' }}
          path: MICROBIT.hex
